<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Horizontes San Miguel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/estilo/style.css">
    <style>
        html, body {
            height: 100vh;
            margin: 0;
            padding: 0;
            width: 100%;
            overflow-x: hidden;
        }
        body {
            display: flex !important;
            justify-content: center !important;
            align-items: flex-start !important;
            background: linear-gradient(135deg, #2c3e50, #3498db) !important;
            min-height: 100vh;
            padding-top: 60px;
        }
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #3498db);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }
        .login-box h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background-color: #3498db;
            color: white;
            width: 100%;
        }
        .btn-primary:hover {
            background-color: #2980b9;
        }
        .btn-success {
            background-color: #27ae60;
            color: white;
        }
        .btn-success:hover {
            background-color: #219a52;
        }
        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }
        .btn-danger:hover {
            background-color: #c0392b;
        }
        .btn-warning {
            background-color: #f39c12;
            color: white;
        }
        .btn-warning:hover {
            background-color: #d68910;
        }
        .admin-container {
            display: none;
            width: 100%;
            background: white;
            min-height: 100vh;
        }
        .admin-header {
            background: linear-gradient(135deg, #2c3e50, #3498db);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-content {
            padding: 30px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        .data-table th, .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .data-table th {
            background: #2c3e50;
            color: white;
            font-weight: 600;
        }
        .data-table tr:hover {
            background: #f8f9fa;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            color: #2c3e50;
        }
        .close-modal {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #888;
        }
        .alert {
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-bar input, .search-bar select {
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
        .search-bar input {
            flex: 1;
        }
        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-item label {
            font-size: 0.9rem;
        }
        .admin-tabs {
            display: flex;
            gap: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid #e0e0e0;
        }
        .admin-tabs .tab-btn {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 500;
            color: #666;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }
        .admin-tabs .tab-btn:hover {
            color: #3498db;
        }
        .admin-tabs .tab-btn.active {
            color: #3498db;
            border-bottom-color: #3498db;
        }
        .tab-section { display: none; }
        .tab-section.active { display: block; }
        .badge { padding: 4px 10px; border-radius: 4px; font-size: 0.85rem; font-weight: 500; }
        .badge-pending { background: #fff3cd; color: #856404; }
        .badge-approved { background: #d4edda; color: #155724; }
        .badge-rejected { background: #f8d7da; color: #721c24; }
        .password-field { font-family: monospace; background: #f5f5f5; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="login-view" class="login-container">
        <div class="login-box">
            <h2><i class="fas fa-user-shield"></i> Admin Horizontes</h2>
            <div id="login-error" class="alert alert-error" style="display: none;"></div>
            <form id="login-form" method="POST">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" required>
                </div>
                <div class="form-group">
                    <label for="contraseña">Contraseña</label>
                    <input type="password" id="contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <div id="admin-view" class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-graduation-cap"></i> Gestión de Carreras</h1>
            <div>
                <span id="admin-user"></span>
                <button class="btn btn-warning" onclick="logout()">Cerrar Sesión</button>
            </div>
        </div>

        <div class="admin-content">
            <div class="admin-tabs">
                <button class="tab-btn active" onclick="switchTab('carreras')">
                    <i class="fas fa-graduation-cap"></i> Gestión de Carreras
                </button>
                <button class="tab-btn" onclick="switchTab('solicitudes')">
                    <i class="fas fa-user-plus"></i> Solicitudes de Registro
                    <span id="solicitudes-count" class="badge badge-pending" style="margin-left: 6px; display: none;">0</span>
                </button>
            </div>

            <div id="tab-carreras" class="tab-section active">
                <div class="search-bar">
                    <input type="text" id="search-carreras" placeholder="Buscar carreras...">
                    <select id="filter-nivel-carrera">
                        <option value="">Todos los niveles</option>
                    </select>
                    <button class="btn btn-success" onclick="openModal('carrera')">
                        <i class="fas fa-plus"></i> Nueva Carrera
                    </button>
                </div>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Nivel</th>
                            <th>Duración</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-carreras"></tbody>
                </table>
            </div>

            <div id="tab-solicitudes" class="tab-section">
                <h3 style="color: #2c3e50; margin-bottom: 15px;">
                    <i class="fas fa-clock"></i> Solicitudes Pendientes
                </h3>
                <div id="solicitudes-pendientes-container">
                    <p style="color: #666;">Cargando...</p>
                </div>

                <h3 style="color: #2c3e50; margin: 30px 0 15px;">
                    <i class="fas fa-history"></i> Historial de Solicitudes
                </h3>
                <div id="solicitudes-historial-container">
                    <p style="color: #666;">Cargando...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-rechazar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Rechazar Solicitud</h3>
                <button class="close-modal" onclick="closeModal('rechazar')">&times;</button>
            </div>
            <form id="form-rechazar">
                <input type="hidden" id="rechazar-solicitud-id">
                <div class="form-group">
                    <label for="motivo-rechazo">Motivo del rechazo</label>
                    <textarea id="motivo-rechazo" rows="3" placeholder="Indicá el motivo del rechazo..." style="width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box;"></textarea>
                </div>
                <button type="submit" class="btn btn-danger">Rechazar Solicitud</button>
            </form>
        </div>
    </div>

    <div id="modal-carrera" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-carrera-title">Nueva Carrera</h3>
                <button class="close-modal" onclick="closeModal('carrera')">&times;</button>
            </div>
            <form id="form-carrera">
                <input type="hidden" id="carrera-id-edit">
                <div class="form-group">
                    <label for="carrera-nombre">Nombre *</label>
                    <input type="text" id="carrera-nombre" required>
                </div>
                <div class="form-group">
                    <label for="carrera-nivel">Nivel *</label>
                    <select id="carrera-nivel" required></select>
                </div>
                <div class="form-group">
                    <label for="carrera-duracion">Duración (meses)</label>
                    <input type="number" id="carrera-duracion">
                </div>
                <div class="form-group">
                    <label for="carrera-descripcion">Descripción</label>
                    <textarea id="carrera-descripcion" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Guardar</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000/api';
        let isLoggedIn = false;

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('admin-view').style.display = 'none';
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const password = document.getElementById('contraseña').value;

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.user.rol !== 'admin') {
                        document.getElementById('login-error').textContent = 'Solo administradores pueden acceder';
                        document.getElementById('login-error').style.display = 'block';
                        return;
                    }
                    localStorage.setItem('user', JSON.stringify(data.user));
                    isLoggedIn = true;
                    showAdmin();
                } else {
                    document.getElementById('login-error').textContent = 'Usuario o contraseña incorrectos';
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('login-error').textContent = 'Error de conexión';
                document.getElementById('login-error').style.display = 'block';
            }
        });

        function showAdmin() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            document.body.style.background = 'white';
            document.body.style.paddingTop = '0';
            const user = JSON.parse(localStorage.getItem('user'));
            document.getElementById('admin-user').textContent = `Bienvenido, ${user.usuario}`;
            loadData();
        }

        function logout() {
            localStorage.removeItem('user');
            isLoggedIn = false;
            document.getElementById('login-view').style.display = 'flex';
            document.getElementById('admin-view').style.display = 'none';
            document.body.style.background = '';
            document.body.style.paddingTop = '60px';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick*="'${tab}'"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            if (tab === 'solicitudes') loadSolicitudes();
        }

        async function loadData() {
            await Promise.all([
                loadNiveles(),
                loadCarreras(),
                loadSolicitudes()
            ]);
        }

        // ====== SOLICITUDES DE REGISTRO ======
        async function loadSolicitudes() {
            try {
                const response = await fetch(`${API_URL}/solicitudes`);
                const solicitudes = await response.json();
                const pendientes = solicitudes.filter(s => s.estado === 'pendiente');
                const procesadas = solicitudes.filter(s => s.estado !== 'pendiente');

                const countBadge = document.getElementById('solicitudes-count');
                if (pendientes.length > 0) {
                    countBadge.textContent = pendientes.length;
                    countBadge.style.display = 'inline';
                } else {
                    countBadge.style.display = 'none';
                }

                document.getElementById('solicitudes-pendientes-container').innerHTML =
                    pendientes.length === 0
                        ? '<p style="color: #666;"><i class="fas fa-check-circle" style="color: #27ae60;"></i> No hay solicitudes pendientes</p>'
                        : renderSolicitudesTable(pendientes, true);

                document.getElementById('solicitudes-historial-container').innerHTML =
                    procesadas.length === 0
                        ? '<p style="color: #666;">No hay solicitudes procesadas</p>'
                        : renderSolicitudesTable(procesadas, false);
            } catch (error) {
                document.getElementById('solicitudes-pendientes-container').innerHTML = '<p style="color: #e74c3c;">Error al cargar solicitudes</p>';
            }
        }

        function renderSolicitudesTable(solicitudes, showActions) {
            return `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>CUE</th>
                            <th>Nombre</th>
                            <th>Barrio</th>
                            <th>Email</th>
                            <th>Contraseña</th>
                            <th>Fecha</th>
                            ${showActions ? '<th>Acciones</th>' : '<th>Estado</th>'}
                        </tr>
                    </thead>
                    <tbody>
                        ${solicitudes.map(s => {
                            const fecha = s.created_at ? new Date(s.created_at).toLocaleDateString() : '-';
                            const estadoBadge = s.estado === 'aprobado'
                                ? '<span class="badge badge-approved">Aprobada</span>'
                                : '<span class="badge badge-rejected">Rechazada</span>';
                            const motivo = s.motivo_rechazo ? `<br><small style="color: #999;">Motivo: ${s.motivo_rechazo}</small>` : '';
                            return `
                                <tr>
                                    <td><strong>${s.cue || '-'}</strong></td>
                                    <td>${s.nombre_establecimiento || s.nombre_contacto || '-'}</td>
                                    <td>${s.barrio || '-'}</td>
                                    <td>${s.email || '-'}</td>
                                    <td><span class="password-field">${s.password_temp || '-'}</span></td>
                                    <td>${fecha}</td>
                                    ${showActions
                                        ? `<td>
                                            <button class="btn btn-success" onclick="aprobarSolicitud(${s.id})" style="padding: 6px 14px; font-size: 0.85rem; margin-right: 5px;">
                                                <i class="fas fa-check"></i> Aprobar
                                            </button>
                                            <button class="btn btn-danger" onclick="abrirRechazar(${s.id})" style="padding: 6px 14px; font-size: 0.85rem;">
                                                <i class="fas fa-times"></i> Rechazar
                                            </button>
                                        </td>`
                                        : `<td>${estadoBadge}${motivo}</td>`
                                    }
                                </tr>
                            `;
                        }).join('')}
                    </tbody>
                </table>
            `;
        }

        async function aprobarSolicitud(id) {
            if (!confirm('¿Estás seguro de aprobar esta solicitud? Se creará un usuario para la institución.')) return;
            try {
                const response = await fetch(`${API_URL}/solicitudes/${id}/aprobar`, { method: 'PUT' });
                if (response.ok) {
                    const data = await response.json();
                    alert(data.message || 'Solicitud aprobada. Usuario creado correctamente.');
                    loadSolicitudes();
                } else {
                    const data = await response.json();
                    alert(data.detail || 'Error al aprobar solicitud');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        }

        function abrirRechazar(id) {
            document.getElementById('rechazar-solicitud-id').value = id;
            document.getElementById('motivo-rechazo').value = '';
            openModal('rechazar');
        }

        document.getElementById('form-rechazar').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('rechazar-solicitud-id').value;
            const motivo = document.getElementById('motivo-rechazo').value;
            try {
                const response = await fetch(`${API_URL}/solicitudes/${id}/rechazar`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ motivo_rechazo: motivo })
                });
                if (response.ok) {
                    closeModal('rechazar');
                    alert('Solicitud rechazada.');
                    loadSolicitudes();
                } else {
                    const data = await response.json();
                    alert(data.detail || 'Error al rechazar solicitud');
                }
            } catch (error) {
                alert('Error de conexión');
            }
        });

        async function loadNiveles() {
            const response = await fetch(`${API_URL}/niveles`);
            const niveles = await response.json();

            const select = document.getElementById('carrera-nivel');
            const filter = document.getElementById('filter-nivel-carrera');

            select.innerHTML = niveles.map(n => `<option value="${n.id}">${n.nombre}</option>`).join('');
            filter.innerHTML = '<option value="">Todos los niveles</option>' +
                niveles.map(n => `<option value="${n.id}">${n.nombre}</option>`).join('');
        }

        async function loadCarreras() {
            const response = await fetch(`${API_URL}/carreras`);
            const carreras = await response.json();

            document.getElementById('tabla-carreras').innerHTML = carreras.map(c => `
                <tr>
                    <td>${c.id}</td>
                    <td>${c.nombre}</td>
                    <td>${c.nivel_nombre || ''}</td>
                    <td>${c.duracion_meses || ''}</td>
                    <td>
                        <button class="btn btn-warning" onclick="editCarrera(${c.id})">Editar</button>
                        <button class="btn btn-danger" onclick="deleteCarrera(${c.id})">Eliminar</button>
                    </td>
                </tr>
            `).join('');
        }

        function openModal(type) {
            document.getElementById(`modal-${type}`).style.display = 'flex';
        }

        function closeModal(type) {
            document.getElementById(`modal-${type}`).style.display = 'none';
        }

        document.getElementById('form-carrera').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('carrera-id-edit').value;

            const data = {
                nombre: document.getElementById('carrera-nombre').value,
                nivel_id: parseInt(document.getElementById('carrera-nivel').value),
                duracion_meses: parseInt(document.getElementById('carrera-duracion').value) || null,
                descripcion: document.getElementById('carrera-descripcion').value
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `${API_URL}/ofertas/${id}` : `${API_URL}/ofertas`;

            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            closeModal('carrera');
            document.getElementById('form-carrera').reset();
            document.getElementById('carrera-id-edit').value = '';
            loadCarreras();
        });

        async function editCarrera(id) {
            const response = await fetch(`${API_URL}/ofertas/${id}`);
            const carrera = await response.json();

            document.getElementById('carrera-id-edit').value = carrera.id;
            document.getElementById('carrera-nombre').value = carrera.nombre;
            document.getElementById('carrera-nivel').value = carrera.nivel_id;
            document.getElementById('carrera-duracion').value = carrera.duracion_meses || '';
            document.getElementById('carrera-descripcion').value = carrera.descripcion || '';

            openModal('carrera');
        }

        async function deleteCarrera(id) {
            if (confirm('¿Estás seguro de eliminar esta carrera?')) {
                await fetch(`${API_URL}/ofertas/${id}`, { method: 'DELETE' });
                loadCarreras();
            }
        }

        document.getElementById('search-carreras').addEventListener('input', function() {
            const texto = this.value.toLowerCase();
            document.querySelectorAll('#tabla-carreras tr').forEach(row => {
                const nombre = row.querySelector('td:nth-child(2)')?.textContent.toLowerCase() || '';
                row.style.display = nombre.includes(texto) ? '' : 'none';
            });
        });

        document.getElementById('filter-nivel-carrera').addEventListener('change', function() {
            const nivel = this.value;
            document.querySelectorAll('#tabla-carreras tr').forEach(row => {
                if (!nivel) { row.style.display = ''; return; }
                const celda = row.querySelector('td:nth-child(3)');
                const text = celda?.getAttribute('data-nivel-id') || '';
                row.style.display = text === nivel ? '' : 'none';
            });
        });
    </script>
</body>
</html>
